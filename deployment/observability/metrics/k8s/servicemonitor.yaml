apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: ticketing-service-monitor
  namespace: observability

  labels:
    release: kube-prometheus-stack

spec:
  namespaceSelector:
    matchNames:
      - default

  selector:
    matchLabels:
      monitoring: enabled

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s