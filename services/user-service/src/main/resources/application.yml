server:
  port: 8081
  ssl:
    enabled: true
    key-store: classpath:backend.p12
    key-store-type: PKCS12
    key-store-password: changeit
    key-alias: springboot

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing_user
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

external:
  client:
    auth:
      uri: https://mock-ticketing.com:8084
      client_id: user-service
      client_secret: secret
      grant_type: authorization_code
      redirect_uri: https://mock-ticketing.com:8081/users/login

logging:
  level:
    com.example.userservice.external.auth.AuthClient: DEBUG
    feign: DEBUG
    org.springframework.security.web.FilterChainProxy: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: always
      show-components: always
     