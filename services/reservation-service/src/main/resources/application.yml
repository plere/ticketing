server:
  port: 8083
  ssl:
    enabled: true
    key-store: classpath:backend.p12
    key-store-type: PKCS12
    key-store-password: changeit
    key-alias: springboot

spring:
  application:
    name: reservation-service
  profiles:
    include:
      - resource
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  datasource:
    url: jdbc:mysql://localhost:3306/ticketing_reservation
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 30000
      circuitbreaker:
        enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        waitDurationInOpenState: 30s # HALF_OPEN 상태로 빨리 전환되어 장애가 복구 될 수 있도록 기본값(60s)보다 작게 설정
        slowCallRateThreshold: 80 # slowCall 발생 시 서버 스레드 점유로 인해 장애가 생길 수 있으므로 기본값(100)보다 조금 작게 설정
        slowCallDurationThreshold: 5s # 위와 같은 이유로 5초를 slowCall로 판단함. 해당 값은 TimeLimiter의 timeoutDuration보다 작아야 함
        registerHealthIndicator: true


management:
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    tags:
      application: ${spring.application.name}

external:
  client:
    concert:
      url: http://localhost:8080
    concert-seat:
      url: http://localhost:8080
    payment:
      url: http://localhost:8085