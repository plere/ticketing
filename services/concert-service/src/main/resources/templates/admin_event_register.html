<!-- src/main/resources/templates/admin_event_register.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공연 등록</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<h1>공연 등록</h1>

<form th:action="@{/admin/events}" th:method="post">
    <div>
        <label for="title">공연명</label>
        <input type="text" id="title" name="title" required />
    </div>

    <div>
        <label for="location">장소</label>
        <input type="text" id="location" name="location" required />
    </div>

    <div>
        <label for="startDateTime">공연 시작 시간</label>
        <input type="datetime-local" id="startDateTime" name="startDateTime" required />
    </div>

    <div>
        <label for="endDateTime">공연 종료 시간</label>
        <input type="datetime-local" id="endDateTime" name="endDateTime" required />
    </div>

    <div>
        <label for="description">공연 설명</label>
        <textarea id="description" name="description" rows="5"></textarea>
    </div>

    <div>
        <button type="submit">등록</button>
    </div>
</form>
</body>
</html>
