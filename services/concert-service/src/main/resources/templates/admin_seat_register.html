<!-- src/main/resources/templates/admin_seat_register.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>좌석 등록</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<h1>좌석 등록</h1>

<form th:action="@{/admin/seats}" th:method="post">
  <div>
    <label for="eventId">공연 ID</label>
    <input type="text" id="eventId" name="eventId" required />
  </div>

  <div>
    <label for="row">좌석 행(Row)</label>
    <input type="text" id="row" name="row" maxlength="1" required />
  </div>

  <div>
    <label for="number">좌석 번호(Number)</label>
    <input type="number" id="number" name="number" required />
  </div>

  <div>
    <label for="price">좌석 가격 (선택)</label>
    <input type="number" id="price" name="price" placeholder="예: 50000" />
  </div>

  <div>
    <button type="submit">좌석 등록</button>
  </div>
</form>
</body>
</html>
