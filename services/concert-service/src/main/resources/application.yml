spring:
  application:
    name: concert-service
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/ticketing_concert
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    org:
      springframework:
        web: WARN
    com.zaxxer.hikari: WARN

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    tags:
      application: ${spring.application.name}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing_concert

logging:
  level:
    org:
      springframework:
        web: DEBUG
    com.zaxxer.hikari: DEBUG