spring:
  application:
    name: concert-service
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing_concert
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none

  sql:
    init:
      mode: alwaysmanagement:

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    tags:
      application: ${spring.application.name}