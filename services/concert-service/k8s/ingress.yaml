apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: concert-service-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: concert.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: concert-service
                port:
                  number: 8080
